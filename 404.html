<!DOCTYPE html>

  <!-- Network Resilience & Async Fonts -->
  <script>
    window.retryAsset = function(el, attempt) {
      if(attempt > 3) { document.documentElement.classList.add('fonts-failed'); return; }
      setTimeout(function() {
        var clone = el.cloneNode();
        clone.onload = function() { this.onload=null; this.rel='stylesheet'; };
        clone.onerror = function() { window.retryAsset(this, attempt+1); };
        el.parentNode.insertBefore(clone, el.nextSibling);
      }, attempt * 1000);
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" onerror="window.retryAsset?window.retryAsset(this,1):null">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css">

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 40px rgba(34,211,238,0.15));
    }
    .error-title {

      font-size: 1.5rem;
      font-weight: 700;

      margin-bottom: 12px;
    }
    .error-desc {

      max-width: 440px;

    }
  </style>
</head>
